name: Deploy Demo Site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  pages-availability:
    runs-on: ubuntu-latest
    outputs:
      pages_supported: ${{ steps.detect.outputs.pages_supported }}
    steps:
      - id: detect
        run: |
          if [ "${{ github.event.repository.private }}" = "true" ]; then
            echo "pages_supported=false" >> "$GITHUB_OUTPUT"
            echo "GitHub Pages is unavailable on the current plan while this repository is private. Skipping demo deployment until the repo is public."
          else
            echo "pages_supported=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: pages-availability
    if: ${{ needs.pages-availability.outputs.pages_supported == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install root dependencies
        run: yarn install --immutable

      - name: Install site dependencies
        working-directory: site
        run: yarn install --immutable

      - uses: actions/configure-pages@v5

      - name: Build static site
        working-directory: site
        env:
          BASE_PATH: /handwritten-signature
        run: yarn build

      - uses: actions/upload-pages-artifact@v4
        with:
          path: site/out

  deploy:
    if: ${{ needs.build.result == 'success' }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
