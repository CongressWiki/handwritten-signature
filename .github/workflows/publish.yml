name: Publish

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

concurrency:
  group: publish-main
  cancel-in-progress: false

jobs:
  publish:
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      VALIDATED_SHA: ${{ github.event.workflow_run.head_sha }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Align checkout to validated commit
        run: git checkout -B main "${VALIDATED_SHA}"

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: yarn install --immutable

      - run: yarn build

      - run: yarn typecheck

      - name: Check validated commit is still current
        id: freshness
        run: |
          REMOTE_SHA=$(git ls-remote origin refs/heads/main | awk '{print $1}')
          if [ "$REMOTE_SHA" != "$VALIDATED_SHA" ]; then
            echo "publishable=false" >> "$GITHUB_OUTPUT"
            echo "origin/main moved to ${REMOTE_SHA} after CI validated ${VALIDATED_SHA}. Skipping stale publish."
          else
            echo "publishable=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check npm trusted publishing readiness
        id: readiness
        if: steps.freshness.outputs.publishable == 'true'
        run: |
          if [ "${{ github.event.workflow_run.repository.private }}" = "true" ]; then
            echo "publishable=false" >> "$GITHUB_OUTPUT"
            echo "Repository is still private. npm provenance via trusted publishing requires a public repository."
            exit 0
          fi

          if npx --yes npm@11.10.0 view "@congresswiki/handwritten-signature" version --registry="https://registry.npmjs.org" >/dev/null 2>&1; then
            echo "publishable=true" >> "$GITHUB_OUTPUT"
          else
            echo "publishable=false" >> "$GITHUB_OUTPUT"
            echo "Package is not bootstrapped on npm yet. Do a one-time manual publish, then configure npm trusted publishing for publish.yml."
          fi

      # Determine version bump type using AI analysis of changes
      - name: Determine version bump type
        id: version
        if: steps.freshness.outputs.publishable == 'true' && steps.readiness.outputs.publishable == 'true'
        env:
          AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          LAST_TAG=$(git tag -l "v*" --sort=-v:refname | head -1 || echo "")

          if [ -n "$LAST_TAG" ]; then
            DIFF_BASE="$LAST_TAG"
          else
            DIFF_BASE=$(git rev-list --max-parents=0 HEAD | tail -1)
          fi

          echo "diff_base=${DIFF_BASE}" >> "$GITHUB_OUTPUT"

          # Check if this version is already published using yarn npm info
          if yarn npm info "@congresswiki/handwritten-signature@${CURRENT_VERSION}" --fields version 2>/dev/null | grep -q "${CURRENT_VERSION}"; then
            echo "Version ${CURRENT_VERSION} already published — analyzing changes..."
          else
            echo "Version ${CURRENT_VERSION} not yet published — publishing as-is"
            echo "bump=none" >> "$GITHUB_OUTPUT"
            echo "version=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Version ${CURRENT_VERSION} already published — analyzing changes..."

          # Get commit messages and diff summary since last version
          COMMITS=$(git log "${DIFF_BASE}..HEAD" --pretty=format:"- %s" 2>/dev/null | head -30)
          DIFF_STAT=$(git diff "${DIFF_BASE}..HEAD" --stat 2>/dev/null | tail -5)
          DIFF_NAMES=$(git diff "${DIFF_BASE}..HEAD" --name-only 2>/dev/null | head -30)

          # If no AI key, fall back to patch
          if [ -z "$AI_GATEWAY_API_KEY" ]; then
            echo "No AI_GATEWAY_API_KEY — defaulting to patch"
            echo "bump=patch" >> "$GITHUB_OUTPUT"
            NEW_VERSION=$(node -e "const [a,b,c]='${CURRENT_VERSION}'.split('.').map(Number);console.log(a+'.'+ b+'.'+(c+1))")
            echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Ask AI to classify the version bump type
          PROMPT="You are a semver versioning assistant for an npm package called @congresswiki/handwritten-signature.
          This package provides an animated handwriting component for React using SVG stroke paths.
          It exports glyphs, layout utilities, and type definitions.

          Analyze these changes and respond with ONLY one word: patch, minor, or major.

          Rules:
          - patch: bug fixes, typo fixes, dependency updates, internal refactors with no API changes
          - minor: new features, new exports, new optional parameters, non-breaking additions (e.g. new glyphs)
          - major: breaking changes to existing exports, removed exports, changed function signatures, renamed types

          Commits since last release:
          ${COMMITS}

          Files changed:
          ${DIFF_NAMES}

          Diff summary:
          ${DIFF_STAT}"

          # Call Vercel AI Gateway (OpenAI-compatible format)
          RESPONSE=$(curl -s -X POST "https://ai-gateway.vercel.sh/v3/ai/chat/completions" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${AI_GATEWAY_API_KEY}" \
            -d "$(jq -n --arg prompt "$PROMPT" '{
              "model": "anthropic/claude-haiku-4-5-20251001",
              "max_tokens": 10,
              "messages": [{"role": "user", "content": $prompt}]
            }')" 2>/dev/null)

          BUMP_TYPE=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "patch"' | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]')

          # Validate response
          if [[ "$BUMP_TYPE" != "patch" && "$BUMP_TYPE" != "minor" && "$BUMP_TYPE" != "major" ]]; then
            echo "AI returned unexpected value '${BUMP_TYPE}' — defaulting to patch"
            BUMP_TYPE="patch"
          fi

          echo "AI determined bump type: ${BUMP_TYPE}"
          echo "bump=${BUMP_TYPE}" >> "$GITHUB_OUTPUT"

          # Calculate new version
          NEW_VERSION=$(node -e "
            const [major, minor, patch] = '${CURRENT_VERSION}'.split('.').map(Number);
            const type = '${BUMP_TYPE}';
            if (type === 'major') console.log((major+1) + '.0.0');
            else if (type === 'minor') console.log(major + '.' + (minor+1) + '.0');
            else console.log(major + '.' + minor + '.' + (patch+1));
          ")
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      # Bump version if needed, publish, commit back
      - name: Publish
        if: steps.freshness.outputs.publishable == 'true' && steps.readiness.outputs.publishable == 'true'
        run: |
          BUMP="${{ steps.version.outputs.bump }}"
          DIFF_BASE="${{ steps.version.outputs.diff_base }}"
          NEW_VERSION="${{ steps.version.outputs.version }}"

          if [ "$BUMP" != "none" ]; then
            echo "Bumping ${BUMP} → ${NEW_VERSION}"

            # Update package.json
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
              pkg.version = '${NEW_VERSION}';
              fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            "
          else
            echo "Publishing current version as-is..."
          fi

          node ./scripts/update-changelog.mjs --version "${NEW_VERSION}" --base "${DIFF_BASE}"

          # Rebuild with any release metadata changes
          yarn build

          # Publish
          npx --yes npm@11.10.0 publish --access public --provenance
          echo "Published ${NEW_VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json CHANGELOG.md

          if ! git diff --cached --quiet; then
            git commit -m "v${NEW_VERSION} [skip ci]"
            git push origin HEAD:main
          fi

          if ! git rev-parse "v${NEW_VERSION}" >/dev/null 2>&1; then
            git tag "v${NEW_VERSION}"
          fi

          git push origin --tags
