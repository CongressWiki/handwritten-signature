name: Publish

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

concurrency:
  group: publish-main
  cancel-in-progress: false

jobs:
  publish:
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      VALIDATED_SHA: ${{ github.event.workflow_run.head_sha }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Align checkout to validated commit
        run: git checkout -B main "${VALIDATED_SHA}"

      - name: Check validated commit is still current
        id: freshness
        run: |
          REMOTE_SHA=$(git ls-remote origin refs/heads/main | awk '{print $1}')
          if [ "$REMOTE_SHA" != "$VALIDATED_SHA" ]; then
            echo "publishable=false" >> "$GITHUB_OUTPUT"
            echo "origin/main moved to ${REMOTE_SHA} after CI validated ${VALIDATED_SHA}. Skipping stale publish."
          else
            echo "publishable=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Enable Corepack (Yarn 4)
        if: steps.freshness.outputs.publishable == 'true'
        run: corepack enable

      - uses: actions/setup-node@v5
        if: steps.freshness.outputs.publishable == 'true'
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        if: steps.freshness.outputs.publishable == 'true'
        run: yarn install --immutable

      - name: Create or update release PR
        id: changesets
        if: steps.freshness.outputs.publishable == 'true'
        uses: changesets/action@v1
        with:
          version: yarn changeset version
          commit: Version packages
          title: Version packages
          commitMode: github-api
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check npm publish readiness
        id: readiness
        if: steps.freshness.outputs.publishable == 'true' && steps.changesets.outputs.hasChangesets == 'false'
        run: |
          if [ "${{ github.event.workflow_run.repository.private }}" = "true" ]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "Repository is private. npm trusted publishing with provenance requires a public repository."
            exit 0
          fi

          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          if npx --yes npm@11.10.0 view "@congresswiki/handwritten-signature@${VERSION}" version --registry="https://registry.npmjs.org" >/dev/null 2>&1; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "Version ${VERSION} is already published. Skipping."
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish current version to npm
        if: steps.readiness.outputs.should_publish == 'true'
        run: yarn release:publish

      - name: Push release tag
        if: steps.readiness.outputs.should_publish == 'true'
        run: |
          VERSION="${{ steps.readiness.outputs.version }}"
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists locally."
          else
            git tag "v${VERSION}"
          fi
          git push origin "v${VERSION}"
